<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Simulador Whatsapp - Rotina com Deus</title>
  <style>
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; background-color: #ece5dd; margin: 0; display: flex; justify-content: center; height: 100vh; }
    .chat-container { width: 100%; max-width: 450px; background: #fff; display: flex; flex-direction: column; height: 100%; box-shadow: 0 0 10px rgba(0,0,0,0.1); }
    .header { background: #075e54; color: #fff; padding: 15px; font-weight: bold; font-size: 1.1em; display: flex; align-items: center; }
    .messages-pane { flex: 1; padding: 15px; overflow-y: auto; background-image: url('https://user-images.githubusercontent.com/15075759/28719144-86dc0f70-73b1-11e7-911d-60d70fcded21.png'); display: flex; flex-direction: column; gap: 10px; }
    .msg { padding: 8px 12px; border-radius: 8px; max-width: 80%; line-height: 1.4; font-size: 14px; position: relative; white-space: pre-wrap; word-wrap: break-word; }
    .msg.sent { background: #dcf8c6; align-self: flex-end; border-top-right-radius: 0; box-shadow: 0 1px 1px rgba(0,0,0,0.1); }
    .msg.rcvd { background: #fff; align-self: flex-start; border-top-left-radius: 0; box-shadow: 0 1px 1px rgba(0,0,0,0.1); }
    .msg-time { font-size: 0.7em; color: #999; margin-left: 10px; float: right; margin-top: 5px; }
    .input-pane { display: flex; padding: 10px; background: #f0f0f0; gap: 10px; }
    input[type="text"] { flex: 1; padding: 12px 15px; border-radius: 30px; border: none; outline: none; font-size: 15px; }
    button { background: #128c7e; color: #fff; border: none; width: 45px; height: 45px; border-radius: 50%; font-size: 18px; cursor: pointer; display: flex; align-items: center; justify-content: center; }
    button:disabled { background: #ccc; cursor: not-allowed; }
  </style>
</head>
<body>
  <div class="chat-container">
    <div class="header">Rotina com Deus IA (Simulador)</div>
    <div class="messages-pane" id="messages">
      <div class="msg rcvd">
        🙏 Simulador Iniciado.<br><br>
        Envie uma mensagem abaixo para a inteligência artificial. O simulador agora está conectado diretamente à <b>sua função na nuvem da Vercel/Supabase</b>.
        <div class="msg-time">Agora</div>
      </div>
    </div>
    <div style="display:flex; justify-content:center; gap: 10px; padding: 8px; background: #e0e0e0;">
      <button id="btnMorning" style="width:auto;height:auto;padding:5px 10px;border-radius:15px;font-size:12px;background:#075e54;">🌅 Simular Manhã</button>
      <button id="btnNoon" style="width:auto;height:auto;padding:5px 10px;border-radius:15px;font-size:12px;background:#075e54;">🕛 Simular Meio-dia</button>
      <button id="btnNight" style="width:auto;height:auto;padding:5px 10px;border-radius:15px;font-size:12px;background:#075e54;">🌙 Simular Noite</button>
    </div>
    <div class="input-pane">
      <input type="text" id="inputMsg" placeholder="Sua mensagem ou btn_..." autofocus autocomplete="off" />
      <button id="micBtn" style="background:#075e54; margin-right: 5px;" title="Enviar áudio">🎤</button>
      <button id="sendBtn" title="Enviar texto">➤</button>
    </div>
  </div>

  <script>
    const msgsPane = document.getElementById('messages');
    const inputMsg = document.getElementById('inputMsg');
    const sendBtn = document.getElementById('sendBtn');
    
    const scrollToBottom = () => { msgsPane.scrollTop = msgsPane.scrollHeight; }

    window.sendOption = (text) => {
      inputMsg.value = text;
      sendMessage();
    }

    const addMessage = (text, type) => {
      const msgDiv = document.createElement('div');
      msgDiv.className = `msg ${type}`;
      msgDiv.innerHTML = `${text}<div class="msg-time">${new Date().toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'})}</div>`;
      msgsPane.appendChild(msgDiv);
      scrollToBottom();
    }

    const sendMessage = async () => {
      const text = inputMsg.value.trim();
      if (!text) return;
      
      addMessage(text, 'sent');
      inputMsg.value = '';
      inputMsg.disabled = true;
      sendBtn.disabled = true;

      const payload = {
        data: {
          key: {
            remoteJid: "5511999999999@s.whatsapp.net"
          },
          message: {
            conversation: text
          }
        }
      };

      try {
        const response = await fetch("https://oyakfsvettzcwterqgom.supabase.co/functions/v1/whatsapp-webhook", {
          method: "POST",
          headers: {
            "Content-Type": "application/json",
            "x-simulator": "true"
          },
          body: JSON.stringify(payload)
        });

        const result = await response.json();
        
        if (result.messages && result.messages.length > 0) {
          result.messages.forEach(m => {
            // Renderização de Áudio
            if (m.includes('🎧 [Áudio Enviado:')) {
              const match = m.match(/\[Áudio Enviado: (.*?)\]/);
              if (match && match[1]) {
                const url = match[1];
                addMessage(`${m}<br><audio controls src="${url}" style="margin-top: 5px; max-width: 100%;"></audio>`, 'rcvd');
                return;
              }
            }
            
            // Renderização de Botões (Simulador)
            if (m.includes('[Botões do Simulador]')) {
              const lines = m.split('\n');
              const text = lines[1] || "";
              const buttons = lines.filter(l => l.startsWith('- ')).map(l => l.replace('- ', ''));
              
              let btnHtml = `<div>${text}</div><div style="display: flex; gap: 5px; flex-wrap: wrap; margin-top: 10px;">`;
              buttons.forEach(b => {
                btnHtml += `<button onclick="sendOption('${b}')" style="width:auto; height:auto; padding: 6px 12px; border-radius: 15px; font-size: 12px; background: #fff; color: #075e54; border: 1px solid #075e54; cursor: pointer;">${b}</button>`;
              });
              btnHtml += `</div>`;
              addMessage(btnHtml, 'rcvd');
              return;
            }

            // Renderização de Menu Interativo (Lista)
            if (m.includes('[Menu Interativo]')) {
              const lines = m.split('\n');
              const text = lines[0].replace('[Menu Interativo] ', '');
              const options = lines.filter(l => l.includes('🔹 ')).map(l => l.replace('  🔹 ', ''));
              
              let listHtml = `<div><b>${text}</b></div><div style="display: flex; flex-direction: column; gap: 5px; margin-top: 10px;">`;
              options.forEach(opt => {
                listHtml += `<div onclick="sendOption('${opt}')" style="padding: 10px; background: #f9f9f9; border: 1px solid #ddd; border-radius: 8px; font-size: 13px; cursor: pointer; hover: background: #eee;">${opt}</div>`;
              });
              listHtml += `</div>`;
              addMessage(listHtml, 'rcvd');
              return;
            }

            addMessage(m, 'rcvd');
          });
        } else if (result.error) {
          addMessage(`Erro interno da Função: ${result.error}`, 'rcvd');
        } else {
           addMessage(`A função não retornou mensagens. Payload bruto:\n${JSON.stringify(result, null, 2)}`, 'rcvd');
        }
      } catch (err) {
        console.error(err);
        addMessage(`Erro ao conectar no Edge Function: ${err.message}.`, 'rcvd');
      } finally {
        inputMsg.disabled = false;
        sendBtn.disabled = false;
        inputMsg.focus();
      }
    };

    sendBtn.addEventListener('click', sendMessage);
    inputMsg.addEventListener('keypress', (e) => {
      if (e.key === 'Enter') sendMessage();
    });

    const triggerCron = async (type) => {
      addMessage(`[SISTEMA] Disparando rotina automática: ${type}...`, 'sent');
      try {
        const response = await fetch(`https://oyakfsvettzcwterqgom.supabase.co/functions/v1/whatsapp-cron?type=${type}`, {
          method: "GET",
          headers: { "x-simulator": "true" }
        });
        const result = await response.json();
        if (result.messages && result.messages.length > 0) {
          result.messages.forEach(m => {
            if (m.includes('🎧 [Áudio Enviado:')) {
              const match = m.match(/\[Áudio Enviado: (.*?)\]/);
              if (match && match[1]) {
                const url = match[1];
                addMessage(`${m}<br><audio controls src="${url}" style="margin-top: 5px; max-width: 100%;"></audio>`, 'rcvd');
                return;
              }
            }
            addMessage(m, 'rcvd');
          });
        } else {
          addMessage(`[SISTEMA] Resultado: ${result.message || JSON.stringify(result)}`, 'rcvd');
        }
      } catch (err) {
        addMessage(`[ERRO CRON] Falha ao disparar servidor: ${err.message}`, 'rcvd');
      }
    };

    document.getElementById('btnMorning').addEventListener('click', () => triggerCron('morning'));
    document.getElementById('btnNoon').addEventListener('click', () => triggerCron('noon'));
    document.getElementById('btnNight').addEventListener('click', () => triggerCron('night'));

    // --- Lógica do Microfone via MediaRecorder ---
    const micBtn = document.getElementById('micBtn');
    let mediaRecorder = null;
    let audioChunks = [];
    let isRecording = false;

    micBtn.addEventListener('click', async () => {
      if (!isRecording) {
        try {
          const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
          mediaRecorder = new MediaRecorder(stream);
          audioChunks = [];
          
          mediaRecorder.ondataavailable = e => { if (e.data.size > 0) audioChunks.push(e.data); };
          mediaRecorder.onstop = async () => {
            const audioBlob = new Blob(audioChunks, { type: 'audio/webm' });
            const reader = new FileReader();
            reader.readAsDataURL(audioBlob);
            reader.onloadend = () => {
              const base64String = reader.result.split(',')[1];
              sendAudioMessage(base64String, 'audio/webm');
            };
          };

          mediaRecorder.start();
          isRecording = true;
          micBtn.innerHTML = "🛑";
          micBtn.style.background = "#d9534f";
          inputMsg.placeholder = "Escutando... (Clique para parar e enviar)";
          inputMsg.disabled = true;
          sendBtn.disabled = true;
        } catch (err) {
          alert('Permissão de microfone negada ou erro ao acessar hardware. Use localhost ou https.');
        }
      } else {
        mediaRecorder.stop();
        mediaRecorder.stream.getTracks().forEach(track => track.stop());
        isRecording = false;
        micBtn.innerHTML = "🎤";
        micBtn.style.background = "#075e54";
        inputMsg.placeholder = "Sua mensagem ou btn_...";
        inputMsg.disabled = false;
        sendBtn.disabled = false;
      }
    });

    const sendAudioMessage = async (base64Data, mimeType) => {
      addMessage('🎤 (Áudio enviando...)', 'sent');
      inputMsg.disabled = true;
      sendBtn.disabled = true;
      micBtn.disabled = true;

      const payload = {
        data: {
          key: { remoteJid: "5511999999999@s.whatsapp.net" },
          message: { audioMessage: { base64: base64Data, mimetype: mimeType } }
        }
      };

      try {
        const response = await fetch("https://oyakfsvettzcwterqgom.supabase.co/functions/v1/whatsapp-webhook", {
          method: "POST",
          headers: { "Content-Type": "application/json", "x-simulator": "true" },
          body: JSON.stringify(payload)
        });
        const result = await response.json();
        if (result.messages && result.messages.length > 0) {
          result.messages.forEach(m => addMessage(m, 'rcvd'));
        }
      } catch (err) {
        addMessage(`[ERRO ÁUDIO] ${err.message}`, 'rcvd');
      } finally {
        inputMsg.disabled = false;
        sendBtn.disabled = false;
        micBtn.disabled = false;
        inputMsg.focus();
      }
    };
  </script>
</body>
</html>
